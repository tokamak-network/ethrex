name: Build & Push Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. latest, v0.1.0)'
        required: false
        default: 'latest'
      push:
        description: 'Push to ghcr.io'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  push:
    branches: [tokamak-dev, feat/app-customized-framework]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.sp1'
      - 'crates/**'
      - 'cmd/**'
      - 'Cargo.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tokamak-network/tokamak-appchain

jobs:
  build-l1:
    name: Build L1 Node Image
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ inputs.push || 'true' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:l1
          build-args: |
            PROFILE=release
            BUILD_FLAGS=
          cache-from: type=gha,scope=l1
          cache-to: type=gha,mode=max,scope=l1

  build-sp1:
    name: Build SP1 Image (L2 + Prover)
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sp1
          push: ${{ inputs.push || 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sp1
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag || 'latest' }}
          build-args: |
            PROFILE=release
            BUILD_FLAGS=--features l2,l2-sql,sp1
            GUEST_PROGRAMS=evm-l2,zk-dex
          cache-from: type=gha,scope=sp1
          cache-to: type=gha,mode=max,scope=sp1
